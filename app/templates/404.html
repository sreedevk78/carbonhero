<!-- templates/404.html -->
{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="ch-section ch-section--alt">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="ch-card ch-card__pad text-center">
                    <div class="ch-hero__kicker text-ch-primary mb-2">404</div>
                    <h1 class="display-5 fw-bold mb-2">This page wandered off.</h1>
                    <p class="text-ch-muted mb-4">The page you’re looking for doesn’t exist or has been moved.</p>
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <a href="{{ url_for('main.home') }}" class="btn btn-ch-primary">
                            <i class="bi bi-house-fill me-2"></i>Return home
                        </a>
                        {% if current_user.is_authenticated %}
                            <a href="{{ url_for('main.dashboard') }}" class="btn btn-ch-outline">
                                <i class="bi bi-speedometer2 me-2"></i>Dashboard
                            </a>
                        {% else %}
                            <a href="{{ url_for('auth.login') }}" class="btn btn-ch-outline">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
